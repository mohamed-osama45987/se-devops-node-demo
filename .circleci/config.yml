version: 2.1

# orbs
orbs:
  node: circleci/node@7.2.1
  docker: circleci/docker@4.0.0
  snyk: snyk/snyk@1.5.0

# jobs
jobs:
  build:
    docker:
      - image: cimg/node:16.10
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run: |
          echo "Installing dependencies..."
          npm install
  test:
    docker:
      - image: cimg/node:16.10
    steps:
      - checkout
      - node/install-packages:
          pkg-manager: npm
      - run: |
          echo "Run tests..."
          npm run test
  publish:
    executor: docker/docker 
    steps:
      - setup_remote_docker
      - checkout
      - docker/check
      - docker/build: #builds the image, similar to docker build -t "name:tag" .
          image: mohamedelshamy2/node
          tag: v1.0.2
      - docker/push: #pushes the image to specified account in the environment variables
          image: mohamedelshamy2/node
          tag: v1.0.2

 # Deploy job
  deploy:
      docker:
        - image: cimg/node:16.10
      steps:
        - setup_remote_docker
        - checkout
        - run: 
            name: Render Push
            command: |  
              curl $DEPLOY_URL

  scan:
        docker:
            - image: cimg/node:16.10
        environment:
            IMAGE_NAME: mohamedelshamy2/node
        steps:
            - checkout
            - setup_remote_docker      
            - docker/check
            - run: docker build -t $IMAGE_NAME .
            - snyk/scan: 
                docker-image-name: $IMAGE_NAME

# workflow
workflows:
  # Name of the workflow is simple_workflow
  simple_workflow:
    jobs:
      - build
      - test:
          requires:
            - build
      # - publish:
      #     requires:
      #       - test
      # - deploy:
      #     requires:
      #       - test
      - scan:
          requires:
            - build
          filters:
            branches:
              only: main